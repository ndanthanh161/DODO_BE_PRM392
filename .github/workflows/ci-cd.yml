name: Build and deploy production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dodo-production
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SMEFLOWSystem.sln

      - name: Build
        run: dotnet build SMEFLOWSystem.sln -c Release --no-restore

      - name: Test
        run: dotnet test SMEFLOWSystem.sln -c Release --no-build --verbosity normal

  build-push-image:
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
      owner_lower: ${{ steps.meta.outputs.owner_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/${OWNER_LOWER}/dodosystem-api" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: SMEFLOWSystem.WebAPI/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest

    deploy:
    needs: build-push-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: dodo-production-deploy
      cancel-in-progress: false

    steps:
      - name: Configure verified SSH
        shell: bash
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"

          printf '%s\n' "$PROD_SSH_KEY" \
            > "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$PROD_KNOWN_HOSTS" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 \
            "$HOME/.ssh/id_ed25519" \
            "$HOME/.ssh/known_hosts"

      - name: Deploy exact commit SHA
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${PROD_USER}@${PROD_HOST}" \
            "deploy ${IMAGE_TAG}"

      - name: Verify public HTTPS health
        shell: bash
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          curl \
            --fail \
            --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-connrefused \
            "https://${PROD_HOST}/health"
