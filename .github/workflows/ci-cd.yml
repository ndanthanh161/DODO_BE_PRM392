name: Build and deploy production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dodo-production
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SMEFLOWSystem.sln

      - name: Build
        run: dotnet build SMEFLOWSystem.sln -c Release --no-restore

      - name: Test
        run: dotnet test SMEFLOWSystem.sln -c Release --no-build --verbosity normal

  build-push-image:
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
      owner_lower: ${{ steps.meta.outputs.owner_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/${OWNER_LOWER}/dodosystem-api" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: SMEFLOWSystem.WebAPI/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest

  deploy:
    needs: build-push-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/dodo
            ./deploy.sh "${{ needs.build-push-image.outputs.image_tag }}"
